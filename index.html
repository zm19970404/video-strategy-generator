"房产中介":`
租房这块属于搜索绩效型赛道。你要做的第一件事不是想怎么拍，是怎么弄到100个号——同城饱和式打击。

📹 怎么拍每一套房：

function initQuickTags(){
  document.getElementById('quickTags').innerHTML = HOT_TAGS.map(t =>
    `<button class="quick-tag" onclick="quickSelect('${t}')">${t}</button>`
  ).join('');
}

function quickSelect(tag){
  document.getElementById('industryInput').value = tag;
  generate();
}

function generate(){
  const input = document.getElementById('industryInput').value.trim();
  if(!input) return;
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  loading.classList.add('show'); result.classList.remove('show');
  document.getElementById('btnGenerate').disabled = true;
  setTimeout(() => {
    loading.classList.remove('show');
    document.getElementById('btnGenerate').disabled = false;
    let data = matchIndustry(input);
    render(data, input);
    result.classList.add('show');
    result.scrollIntoView({behavior:'smooth',block:'start'});
  }, 600);
}

function matchIndustry(input){

    "理发":"美发","剪发":"美发","发型":"美发","tony":"美发",

    "装修":"家电清洗","建材":"家电清洗","瓷砖":"家电清洗",

function render(data, input){
  let content = data.content;
  // Parse shot items
  content = content.replace(/<shot>/g, '<div class="shot-item">');
  content = content.replace(/<\/shot>/g, '</div>');
  // Parse real-talk
  content = content.replace(/📹/g, '<div style="font-weight:700;color:#60a5fa;margin-top:12px;margin-bottom:4px;font-size:13px">📹');
  content = content.replace(/💰/g, '<div style="font-weight:700;color:#f59e0b;margin-top:12px;margin-bottom:4px;font-size:13px">💰');
  // First heading
  const firstP = content.indexOf('\n');
  const intro = content.substring(0, firstP > 0 ? firstP : content.length);
  const rest = content.substring(firstP > 0 ? firstP : content.length);

  document.getElementById('result').innerHTML = `
    <div class="block">
      <div class="block-title"><span class="icon">🎯</span>「${data.key}」——就这么拍</div>
      <div class="big-idea">${intro}</div>
      <div style="font-size:13px;line-height:2.2;color:#bbb">${rest}</div>
    </div>
    <div class="bottom-note">
      💡 搞流量的核心就四个东西——<b style="color:#f87171">钱</b>、<b style="color:#f59e0b">冲突</b>、<b style="color:#34d399">反差</b>、<b style="color:#60a5fa">情绪</b>。这四样一样没有的，再好的画面也火不了。<br>
      💡 同城生意记住——<b style="color:#f59e0b">号多比号精重要</b>。饱和式打击，别死磕一个号。<br>
      💡 产品型生意记住——<b style="color:#f59e0b">先做人设，再卖货</b>。没有人设的产品，怎么拍都是推销。
    </div>
  `;
}
