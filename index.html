<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业百问 · 你做什么的，我告诉你怎么拍</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f0f;color:#e8e8e8;height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:14px 16px 8px;flex-shrink:0}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:#555;margin-top:2px}

/* 聊天区 */
.chat-area{flex:1;overflow-y:auto;padding:12px 16px 18px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:99px}

/* 引导消息 */
.welcome-msg{text-align:center;padding:20px 0 12px}
.welcome-msg .emoji{font-size:40px;margin-bottom:8px}
.welcome-msg .msg{font-size:15px;color:#bbb;line-height:1.8;margin-bottom:3px}
.welcome-msg .msg b{color:#60a5fa}

/* 快捷入口 */
.guide-tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:8px 0 16px}
.guide-tag{padding:7px 14px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:99px;font-size:12px;color:#888;cursor:pointer;transition:.2s;font-family:inherit}
.guide-tag:hover{border-color:#60a5fa;color:#e0e0e0}

/* 消息气泡 */
.msg-row{display:flex;margin-bottom:14px;animation:msgIn .25s ease-out}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.msg-bubble{max-width:88%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.9}
.msg-row.user .msg-bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg-row.bot .msg-bubble{background:#1a1a2e;border:1px solid #2a2a3e;color:#ddd;border-bottom-left-radius:4px}
.msg-bubble .shot-item{margin-top:10px;padding:10px 14px;background:rgba(255,255,255,.06);border-radius:10px;margin-bottom:6px;font-size:13px}
.msg-row.user .msg-bubble .shot-item{background:rgba(255,255,255,.12)}
.msg-bubble .section-title{font-weight:700;color:#60a5fa;margin-top:10px;margin-bottom:4px;font-size:13px;display:flex;align-items:center;gap:4px}
.msg-row.user .msg-bubble .section-title{color:rgba(255,255,255,.8)}
.msg-bubble .highlight{color:#f59e0b;font-weight:600}
.key-point{padding:10px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;margin-top:10px;font-size:12px;color:#f59e0b;line-height:1.8}

/* 正在输入 */
.typing{display:none;align-items:center;gap:6px;padding:10px 14px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;margin-bottom:14px;font-size:12px;color:#888;max-width:200px}
.typing.show{display:flex}
.typing .dot{width:6px;height:6px;border-radius:50%;background:#666;animation:dotBounce 1.4s infinite}
.typing .dot:nth-child(2){animation-delay:.2s}
.typing .dot:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{opacity:.2;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

/* 输入区 */
.input-bar{flex-shrink:0;padding:10px 16px 24px;background:#0f0f0f;border-top:1px solid #1a1a2e}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:12px 16px;background:#1a1a2e;border:1.5px solid #2a2a3e;border-radius:99px;color:#e8e8e8;font-size:15px;outline:none;font-family:inherit;transition:.2s}
.input-row input:focus{border-color:#60a5fa}
.input-row input::placeholder{color:#555}
.input-row button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#a78bfa);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit}
.input-row button:disabled{opacity:.4}

/* 重置按钮 */
.reset-bar{text-align:center;padding:4px 0 12px}
.reset-btn{background:none;border:none;color:#555;font-size:11px;cursor:pointer;font-family:inherit}
.reset-btn:hover{color:#888}

@keyframes msgIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <h1>📹 行业百问</h1>
  <div class="sub">你做什么的，我告诉你怎么拍</div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome-msg">
    <div class="emoji">👋</div>
    <div class="msg">告诉我你是<b>做什么行业的</b></div>
    <div class="msg" style="font-size:13px;color:#666;margin-top:4px">我把怎么拍、拍什么、怎么变现直接告诉你</div>
  </div>
  <div class="guide-tags" id="guideTags"></div>
</div>

<div class="typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span>正在想你这个行业该怎么拍...</div>

<div class="input-bar">
  <div class="input-row">
    <input type="text" id="chatInput" placeholder="比如：我是做烧烤的..."
           onkeydown="if(event.key==='Enter')send()">
    <button id="btnSend" onclick="send()">→</button>
  </div>
  <div class="reset-bar"><button class="reset-btn" onclick="resetChat()">重新开始</button></div>
</div>

<script>
// ── 行业答案库（与之前的DB数据一致，改为对话口吻） ──
const DB = {
"烧烤":`烧烤卖的不是肉串，是江湖气和人情味。记住啊——让你将来的客户管你叫哥，不是叫老板。

<div class="section-title">📹 日常引流</div>
<div class="shot-item"><b>①</b> 拍你凌晨去菜市场进货——蹲在肉摊前面用手捏一捏、凑近看一眼。这动作比你说一百句"我家肉新鲜"都有用。</div>
<div class="shot-item"><b>②</b> 拍你手工串肉——不是拍成品，拍串了一半的、手上全是油的。观众看的不是好不好看，是你是不是真自己串。</div>
<div class="shot-item"><b>③</b> 拍你烤不过来的样子——满头汗、烟熏得眯眼、手忙脚乱。这叫生意好。</div>
<div class="shot-item"><b>④</b> 拍你给每一桌送酒——不是服务员送，是你自己送。走到桌边说一句"这瓶算我的，喝好"。</div>
<div class="shot-item"><b>⑤</b> 拍你豪气地大吼——"今晚所有的消费由我买单！"站起来、举杯、对着全场喊。就这一个镜头。</div>

<div class="section-title">📹 同城搜索</div>
<div class="shot-item">店名、地址、营业时间打在每条标题上。号多弄一点——同城饱和式打击，别死磕一个号。</div>

<div class="section-title">💰 怎么变现</div>
<div class="shot-item">肉串烤得一般的——把人情味拉满。技术一流的——当我放屁，你随便拍。抠抠搜搜的烧烤店等着倒闭。</div>`,

"美发":`美发两条路。技术牛逼的走一条，技术一般的走另一条。

<div class="section-title">📹 有技术</div>
<div class="shot-item"><b>①</b> 拍造型前后变化——剪之前一张脸，剪之后同一张脸。三秒一个视频。客户自己会来。</div>
<div class="shot-item"><b>②</b> 第一视角拍剪发细节——你歪头看了3秒、又拿起剪刀修一下。客户看的不是发型，是你这个人认不认真。</div>

<div class="section-title">📹 没技术</div>
<div class="shot-item">卖护发精油、假发、染发膏、白变黑——拍使用前后对比。就这么简单。</div>
<div class="shot-item">拍顾客说"想换个颜色"，你上手操作，过程快剪，最后成品展示。换不同的人循环拍。</div>

<div class="section-title">📹 接本地客户</div>
<div class="shot-item">找几个朋友假装顾客，拍他们做完头发自己照镜子笑了的那一刻——不是摆拍的笑，是满意的笑。那个笑就是你最好的广告。</div>

<span class="highlight">一句话：有本事靠技术吃饭，没本事靠产品吃饭。都行。</span>`,

"卖酒":`卖酒最重要的是ID。没有ID，酒再好也没人信你。

<div class="section-title">📹 建立信任</div>
<div class="shot-item"><b>①</b> 客户拿酒来回收——你看两眼直接说"你买的时候被人骗了，这个是假的"。然后教他怎么辨别真假，一个细节一个细节指给他看。全过程闲聊。</div>
<div class="shot-item"><b>②</b> 讲各种老酒的价值——对着酒瓶讲、对着标讲、对着酒花讲。别讲理论。</div>

<div class="section-title">📹 行业秘密（最吸引人）</div>
<div class="shot-item">"福建这边一旦会10块到20块的砸客户——这里面打的很脏，我这里不方便说。你硬要做，私下找我。"欲言又止的感觉。</div>

<div class="section-title">📹 搜索流量</div>
<div class="shot-item">短科普——怎么看酒花、怎么看年份、真假茅台的三个区别。讲清楚就行，不用花哨。</div>`,

"卖茶叶":`茶叶最重要的——做ID。

<div class="section-title">📹 打信任</div>
<div class="shot-item"><b>①</b> 第一视角泡茶全流程——边泡茶边讲故事。茶叶的核心不是多好喝，是故事讲得好不好。故事讲好了，茶叶自然卖得好。</div>
<div class="shot-item"><b>②</b> 吐槽市场乱象——别点名，就说现象。</div>

<div class="section-title">📹 怎么卖</div>
<div class="shot-item"><b>①</b> 展现各价位品相区别——不同价位的茶叶排一排放桌上，一个镜头扫过去讲区别。</div>
<div class="shot-item"><b>②</b> 客户返图——"来看看这是刚去新家的宝宝，客户返新的视频啦"。</div>
<div class="shot-item"><b>③</b> 直播品种鉴定——边鉴定边卖自己的。自然就转过来了。</div>

<div class="section-title">📹 行业真相</div>
<div class="shot-item">福建这边10到20块砸客户——这行打的很脏。不方便说太细。你硬要做私下找我。</div>`,

"房产中介":`租房这块属于搜索绩效型赛道。你要做的第一件事不是想怎么拍——是弄到100个号，同城饱和式打击。

<div class="section-title">📹 每一套房怎么拍</div>
<div class="shot-item"><b>①</b> 先讲优点、再说缺点——"这个房子采光很好，但是厨房小，你要是天天做饭可能不够用"。真诚到骨子里。</div>
<div class="shot-item"><b>②</b> 结尾编一个客户信息——"如果你是月薪5000的在哪哪上班，我不建议你住。但月薪8000的可以考虑"。从客户角度出发。</div>
<div class="shot-item"><b>③</b> 拍你自己在房子里看窗外、看采光、看邻居门口。观众想知道的是你怎么判断这房子值不值。</div>

<div class="section-title">📹 写字楼中介玩法</div>
<div class="shot-item">"这个房间原先住过一个人——最早推着车卖袜子起步，赚了第一个10万租了这里，然后干到200万，现在去北京了。"故事讲曲折一点，像导游讲故事但只讲不乱走。更新10条后，第11条开始每条结尾加"租金多少，需要的找我"。名字改成XX中介，别起什么暴躁老奶大战奥特曼。</div>`,

"纹身":`纹身两种内容交叉做。

<div class="section-title">📹 第一种——搞笑引流</div>
<div class="shot-item">买奇怪的纹身贴——小猪佩奇、天线宝宝。顾客说要纹这个，你很诧异，最后还是纹了。</div>
<div class="shot-item">配合人设一起做——未成年来纹你骂走；有人纹"爱谁谁一辈子"你拒了讲道理。过程一定要露出自己好看的花臂——体现技术、风趣、正直。</div>

<div class="section-title">📹 第二种——搜索流量</div>
<div class="shot-item">把技术展现出来就行。同城搜索——店名地址打上去，号多开一点。</div>

<div class="section-title">📹 乡镇玩法</div>
<div class="shot-item">每个来的人都采访——做什么的、怎么赚钱的、为什么能开这么好的车。闲聊的方式。结尾说保养得很好。做上100条乡镇基本都知道你了。</div>`,

"二手车":`<div class="section-title">📹 怎么引流</div>
<div class="shot-item">请100个精神小伙来试驾——骑之前戴着金链子歪脖子，戴头盔上车就是超帅机车少年。拍前后对比。反差就是流量。</div>

<div class="section-title">📹 怎么成交</div>
<div class="shot-item">跟客户闲聊——做什么的呀、怎么赚钱的、能不能教教我。你谦逊一点。同城圈子就那么大，那个圈子的人会被同圈子的人吸引。慢慢你就在圈子里了。</div>`,

"摄影":`<div class="section-title">📹 约拍</div>
<div class="shot-item">出去扫街拍美女帅哥，打出照片送人家——拍人家收到照片的惊喜状态。最好城市是旅游城市，会有不断来的游客找跟拍。</div>

<div class="section-title">📹 活动跟拍</div>
<div class="shot-item">开头"一天5000的活动，摄影都要干什么？"第一人称记录。记住——哪怕你没5000一天也要说有，不然来的都是低客单的。</div>

<div class="section-title">📹 剪辑接单</div>
<div class="shot-item">宣传抖音各种美女，10万粉后——美女的榜一大哥会来找你派单，让你剪辑宣传他的主播。</div>`,

"宠物店":`宠物做的是信任。

<div class="section-title">📹 引流</div>
<div class="shot-item"><b>①</b> 吐槽市场乱象——"这品相你跟我说纯的？"别点名。</div>
<div class="shot-item"><b>②</b> 展现各价位品相区别——不同价位的并排对比着讲。</div>
<div class="shot-item"><b>③</b> 客户返图——"来看看这是刚去新家的宝宝"。</div>

<div class="section-title">📹 成交</div>
<div class="shot-item"><b>①</b> 品种鉴定——拍你怎么辨别品相、健康、性格。边鉴定边介绍自家的。</div>
<div class="shot-item"><b>②</b> 直播品种鉴定——边鉴定边卖。转化最快。</div>`,

"清吧":`清吧跟烧烤一个道理——背后都是人情味和江湖气。

<div class="shot-item"><b>①</b> 拍第一视角听最久的客户吹牛逼——日常打流量。</div>
<div class="shot-item"><b>②</b> 拍今晚全场消费你买单——站起来、举杯、大吼一声。</div>
<div class="shot-item"><b>③</b> 拍你给每桌送酒——自己送，不是服务员。走到桌边说"这瓶算我的"。</div>
<div class="shot-item"><b>④</b> 拍你每桌敬酒——跟熟人聊、跟新客寒暄。</div>

<span class="highlight">抠抠搜搜的清吧，等着倒闭。</span>`,

"摆摊":`摆摊两条路线。

<div class="section-title">📹 第一种——展现赚钱</div>
<div class="shot-item">全部以钱为开头——"5块"→做一会→"您拿好"。"10块"→做一会→"您拿好"。中间穿插"排队排队，稍等一下"。要热闹，不热闹请托站边上。结尾算今天赚了多少。</div>

<div class="section-title">📹 第二种——剧情</div>
<div class="shot-item">学校门口摆摊。妈妈接孩子先自己吃，孩子想吃妈妈说垃圾食品别吃。第二天妈妈来买，你说是垃圾食品不卖她。她说要"大份的"，你说"好嘞"。一周两三条。</div>

<div class="section-title">📹 想做招商</div>
<div class="shot-item">第一视角拍摆摊一天赚1000起。自己做不到就别割韭菜。美化开头、简化过程、强调结尾。</div>`,

"少儿培训":`<div class="shot-item">第一视角严厉地去拍——谁不听话就严厉地改正他。家长把孩子给你是希望你帮他管好孩子。</div>
<div class="shot-item">记住——是严厉不是凶。中国家长在学习这块的心态你又不是不知道。不要太和善——和善了他会觉得你没在管。你只能先要能接受严厉这类家长。两个都要不可能。</div>`,

"舞蹈老师":`分成人舞蹈和儿童舞蹈。

<div class="section-title">📹 三个方向轮着来</div>
<div class="shot-item"><b>①</b> 技巧教学——边上跟一个学员，你教她做，错了重来对了点头。</div>
<div class="shot-item"><b>②</b> 和一个学员跳完整片段——你站前面她在后面。好不好看不重要，但一定要有。</div>
<div class="shot-item"><b>③</b> 你站前面后面一排学员——前三秒教怎么跳，下一秒所有人跟你一起起舞。那个画面本身就震撼。</div>`,

"汽修":`<div class="section-title">📹 两条路</div>
<div class="shot-item"><b>①</b> 把牙刷的卖了——弄个整备车间，旧车收拾干净再卖。利润高了就不用拍视频了。</div>
<div class="shot-item"><b>②</b> 找演员找台车——本质就是听醉酒的大哥吹牛逼。结尾记录今天赚多少。全国各地都能抄。</div>`,

"家电清洗":`同城搜索流量——怎么体现你们靠谱怎么拍。号要多。有美女帅哥的话事半功倍。直接找同行视频混剪然后同城本地推。同城搜索又不是要打爆，饱和式打击就够了。`,

"家具":`拍别人向往的生活和生活态度。没有就别拍了——除非你有不一样的优势或身份背书。

介绍场地、服务设施、价格。同城饱和式打击。找几个美女帅哥过来坐坐拍拍，效果更好。`,

"花店":`<div class="section-title">📹 两个方向</div>
<div class="shot-item"><b>①</b> 拍包花过程——从散花到成品，中间快剪。配温柔音乐。日常打流量。</div>
<div class="shot-item"><b>②</b> 深夜偷偷去别人菜地/果园——给其中一株专门施肥，这株长得比别人快结果比别人多。最好增加绿植鲜花的比例。做TOC。</div>`,

"蛋糕店":`<div class="section-title">📹 怎么拍</div>
<div class="shot-item"><b>①</b> 拍做蛋糕全过程——打蛋、搅拌、入模、出炉、裱花，中间快剪，最后成品。手艺好就是最好的广告。</div>

const HOT_TAGS = ["烧烤","美发","卖酒","房产中介","纹身","卖茶叶","二手车","摄影","宠物店","清吧","摆摊","少儿培训","舞蹈老师","汽修","花店","蛋糕店","民宿","钓鱼","家政","健身","美甲","酒吧","火锅","奶茶","装修","二手车","家电清洗","洗车","知识付费"];

function initGuideTags(){
  const shuffled = [...HOT_TAGS].sort(()=>Math.random()-.5).slice(0,12);
  document.getElementById('guideTags').innerHTML = shuffled.map(t=>
    `<button class="guide-tag" onclick="quickAsk('${t}')">${t}</button>`
  ).join('');
}

function quickAsk(tag){ document.getElementById('chatInput').value=`我是做${tag}的`; send(); }

  for(let k of Object.keys(DB)){ if(s.includes(k) || k.includes(s)) return DB[k]; }
  const map = {
    "餐饮":"烧烤","饭店":"烧烤","烤肉":"烧烤","火锅":"烧烤","串串":"烧烤","炸串":"摆摊","大排档":"烧烤",
    "理发":"美发","剪发":"美发","发型":"美发","tony":"美发","美甲":"美发","美容":"美发","皮肤管理":"美发","纹绣":"美发",
    "白酒":"卖酒","红酒":"卖酒","洋酒":"卖酒","老酒":"卖酒","回收":"卖酒",
    "中介":"房产中介","卖房":"房产中介","租房":"房产中介",
    "修车":"汽修","改装":"汽修","保养":"汽修","维修":"汽修",
    "刺青":"纹身","纹眉":"美发",
    "茶":"卖茶叶","白茶":"卖茶叶","普洱":"卖茶叶","茶具":"卖茶叶",
    "保洁":"家电清洗","家政":"家电清洗","月嫂":"家电清洗","钟点工":"家电清洗","装修":"家电清洗","建材":"家电清洗",
    "婚礼":"摄影","婚纱":"摄影","摄像":"摄影","拍照":"摄影","旅拍":"摄影",
    "舞蹈":"舞蹈老师","拉丁":"舞蹈老师","芭蕾":"舞蹈老师","街舞":"舞蹈老师","瑜伽":"舞蹈老师",

    "酒吧":"清吧","酒馆":"清吧",
    "夜市":"摆摊","小吃":"摆摊","路边摊":"摆摊","摊贩":"摆摊",

    "健身":"少儿培训","私教":"少儿培训","游泳":"少儿培训",
    "洗车":"洗车","汽车美容":"洗车",

    "钓鱼":"钓鱼","路亚":"钓鱼",
    "鲜花":"花店","绿植":"花店","花艺":"花店","盆栽":"花店",

  };
  for(let [kw, target] of Object.entries(map)){
    if(s.includes(kw) && DB[target]) return DB[target];

function addMsg(role, html){
  const div = document.createElement('div');
  div.className = `msg-row ${role}`;
  div.innerHTML = `<div class="msg-bubble">${html}</div>`;
  document.getElementById('chatArea').appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

function send(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  // Remove welcome
  const welcome = document.querySelector('.welcome-msg');
  const guideTags = document.getElementById('guideTags');
  if(welcome) welcome.style.display = 'none';
  if(guideTags) guideTags.style.display = 'none';

  // Add user message
  addMsg('user', text);

  // Show typing
  const typing = document.getElementById('typing');
  typing.classList.add('show');
  typing.scrollIntoView({behavior:'smooth',block:'end'});

  document.getElementById('btnSend').disabled = true;
  document.getElementById('chatInput').disabled = true;

  // Simulate thinking
  setTimeout(() => {
    typing.classList.remove('show');
    const result = matchIndustry(text);
    addMsg('bot', result);
    document.getElementById('btnSend').disabled = false;
    document.getElementById('chatInput').disabled = false;
    document.getElementById('chatInput').value = '';
    document.getElementById('chatInput').focus();
  }, 600 + Math.random()*400);
}

function resetChat(){
  const area = document.getElementById('chatArea');
  area.innerHTML = `
    <div class="welcome-msg">
      <div class="emoji">👋</div>
      <div class="msg">告诉我你是<b>做什么行业的</b></div>
      <div class="msg" style="font-size:13px;color:#666;margin-top:4px">我把怎么拍、拍什么、怎么变现直接告诉你</div>
    </div>
    <div class="guide-tags" id="guideTags"></div>
  `;
  initGuideTags();
  document.getElementById('chatInput').value = '';
  document.getElementById('chatInput').focus();
}

initGuideTags();
</script>
