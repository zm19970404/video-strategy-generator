<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业百问</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f0f;color:#e8e8e8;height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:16px;flex-shrink:0}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:#555}
.chat-area{flex:1;overflow-y:auto;padding:12px 16px}
.msg{margin-bottom:12px;max-width:88%}
.msg.user{margin-left:auto;background:#2563eb;color:#fff;padding:12px 16px;border-radius:16px 16px 4px 16px;font-size:14px;line-height:1.7}
.msg.bot{background:#1a1a2e;border:1px solid #2a2a3e;color:#ddd;padding:12px 16px;border-radius:16px 16px 16px 4px;font-size:14px;line-height:1.9}
.msg.bot .shot-item{margin-top:8px;padding:8px 12px;background:rgba(255,255,255,.06);border-radius:8px}
.msg.bot .highlight{color:#f59e0b;font-weight:600}
.input-bar{flex-shrink:0;padding:10px 16px 24px;background:#0f0f0f;border-top:1px solid #1a1a2e;display:flex;gap:8px}
.input-bar input{flex:1;padding:12px 16px;background:#1a1a2e;border:1.5px solid #2a2a3e;border-radius:99px;color:#e8e8e8;font-size:15px;outline:none}
.input-bar input:focus{border-color:#60a5fa}
.input-bar button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#a78bfa);border:none;color:#fff;font-size:18px;cursor:pointer}
.input-bar button:disabled{opacity:.4}
.welcome{padding:20px 0 12px;text-align:center;font-size:15px;color:#bbb;line-height:1.8}
.guide{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:8px 0}
.guide button{padding:7px 14px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:99px;font-size:12px;color:#888;cursor:pointer}
.guide button:hover{border-color:#60a5fa;color:#e0e0e0}
.typing{display:none;padding:10px 14px;color:#888;font-size:12px}
.typing.show{display:flex;align-items:center;gap:6px}
.typing .dot{width:6px;height:6px;border-radius:50%;background:#666;animation:dotBounce 1.4s infinite}
.typing .dot:nth-child(2){animation-delay:.2s}
.typing .dot:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{opacity:.2;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>

<div class="header"><h1>📹 行业百问</h1><div class="sub">你做什么的，告诉你怎么拍</div></div>
<div class="chat-area" id="chat">
  <div class="welcome">告诉我你是<b>做什么行业的</b></div>
  <div class="guide" id="guide"></div>
</div>
<div class="typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span>正在想...</div>
<div class="input-bar">
  <input type="text" id="msg" placeholder="比如：我是做烧烤的..." onkeydown="if(event.key==='Enter')send()">
  <button id="btn" onclick="send()">→</button>
</div>

<script>
var sid = localStorage.getItem('sid') || '';

(function init(){
  var tags = ['烧烤','火锅','美发','奶茶','卖酒','房产中介','纹身','卖茶叶','二手车','摄影','宠物','清吧','摆摊','少儿培训','舞蹈','汽修','蛋糕','花店','民宿','钓鱼','家电清洗','洗车','婚庆','月嫂','搬家','瑜伽','律师','保险','开锁','剧本杀','密室','除甲醛','防水补漏','洗衣店','便利店','水果店','眼镜店','药店','健身房','美甲','酒吧','全屋定制','瓷砖','窗帘','化妆','空调维修','绿植','知识付费'];
  document.getElementById('guide').innerHTML = tags.sort(function(){return Math.random()-0.5}).slice(0,12).map(function(t){return '<button onclick="quickAsk(\''+t+'\')">'+t+'</button>'}).join('');
})();

function quickAsk(t){ document.getElementById('msg').value='我是做'+t+'的'; send(); }

function addMsg(role, html){
  var d = document.createElement('div');
  d.className = 'msg '+role;
  d.innerHTML = html;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth',block:'end'});
}

async function send(){
  var text = document.getElementById('msg').value.trim();
  if(!text) return;
  var w = document.querySelector('.welcome');
  var g = document.getElementById('guide');
  if(w) w.remove(); if(g) g.remove();
  addMsg('user', text);
  document.getElementById('msg').value = '';
  document.getElementById('btn').disabled = true;
  document.getElementById('typing').classList.add('show');

  try {
    if(!sid){ sid = 'sess_' + Date.now().toString(36); localStorage.setItem('sid', sid); }
    var resp = await fetch('/ask/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({sid:sid, message:text})
    });
    var data = await resp.json();
    var reply = data.reply || '';
    if(reply) addMsg('bot', reply);
  } catch(e){
    addMsg('bot', '网络异常，刷新页面试试。');
  }

  document.getElementById('typing').classList.remove('show');
  document.getElementById('btn').disabled = false;
  document.getElementById('msg').focus();
}
</script>
</body>
</html>
