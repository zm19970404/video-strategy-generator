<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f0f;color:#e8e8e8;height:100vh;display:flex;flex-direction:column}

.cdk-box input:focus{border-color:#60a5fa}

</style>

<body>

<!-- CDK 激活门 -->
<div class="cdk-overlay" id="cdkOverlay">
  <div class="cdk-box">

<div class="header">
  <h1>📹 行业百问</h1>
  <div class="sub">你做什么的，我告诉你怎么拍 · 可以一直聊下去</div>

<div class="chat-area" id="chatArea">

</div>

<div class="typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>

<div class="input-bar">

           onkeydown="if(event.key==='Enter')send()">

  </div>
  <div class="reset-bar"><button class="reset-btn" onclick="resetChat()">重新开始</button></div>
</div>

<script src="cdks.js"></script>
<script>
// ── CDK 验证 (纯本地, 零网络请求) ──────────
const CDK_STORAGE_KEY = 'vg_cdk_token';
const CDK_INPUT_KEY = 'vg_cdk_input';

(function checkAccess(){
  const stored = localStorage.getItem(CDK_STORAGE_KEY);
  const savedInput = localStorage.getItem(CDK_INPUT_KEY);
  if(stored){ document.getElementById('cdkOverlay').classList.add('hidden'); }
  if(savedInput){ document.getElementById('cdkInput').value = savedInput; }
})();

async function validateCDK(){
  const input = document.getElementById('cdkInput').value.trim().toUpperCase();
  const btn = document.getElementById('cdkBtn');
  const msg = document.getElementById('cdkMsg');
  msg.className = 'cdk-msg'; msg.style.display = 'none';
  if(!input){ showCDKMsg('请输入激活码','error'); return; }

  btn.disabled = true; btn.textContent = '验证中...';

  // 纯本地验证 — 毫秒级响应
  await new Promise(r => setTimeout(r, 300)); // 小延迟让人感觉在"验证"
  if(VALID_CDKS.has(input)){
    localStorage.setItem(CDK_STORAGE_KEY, 'cdk_' + Date.now());
    if(!localStorage.getItem(CDK_INPUT_KEY)) localStorage.setItem(CDK_INPUT_KEY, input);
    showCDKMsg('激活成功！','success');
    setTimeout(()=>{ document.getElementById('cdkOverlay').classList.add('hidden'); }, 600);
  } else {
    showCDKMsg('激活码无效，请检查后重试','error');
    btn.disabled = false; btn.textContent = '激活使用';
  }
}

function showCDKMsg(text, type){
  const msg = document.getElementById('cdkMsg');
  msg.textContent = text;
  msg.className = `cdk-msg show ${type}`;
}

function clearCDK(){
  localStorage.removeItem(CDK_STORAGE_KEY);
  localStorage.removeItem(CDK_INPUT_KEY);
  document.getElementById('cdkInput').value = '';
  document.getElementById('cdkMsg').className = 'cdk-msg';
  document.getElementById('cdkMsg').textContent = '';
  document.getElementById('cdkBtn').disabled = false;
  document.getElementById('cdkBtn').textContent = '激活使用';
  document.getElementById('cdkOverlay').classList.remove('hidden');
}

// ── 上下文记忆 ──────────────────────
let lastIndustry = '';  // 记住当前在聊什么行业
let convTurn = 0;       // 对话轮次

// ── 对话持久化 ──────────────────────
const CHAT_STORAGE_KEY = 'vg_chat_history';

function saveChat(){
  const chatArea = document.getElementById('chatArea');
  // 只保存消息行，不保存欢迎页+引导标签
  const msgRows = chatArea.querySelectorAll('.msg-row');
  let saved = [];
  msgRows.forEach(row => {
    const bubble = row.querySelector('.msg-bubble');
    if(bubble) saved.push({role: row.classList.contains('user')?'user':'bot', html: bubble.innerHTML});
  });
  const state = { lastIndustry, convTurn, messages: saved, savedAt: Date.now() };
  try { localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

function restoreChat(){
  try {
    const raw = localStorage.getItem(CHAT_STORAGE_KEY);
    if(!raw) return false;
    const state = JSON.parse(raw);
    if(!state.messages || !state.messages.length) return false;
    lastIndustry = state.lastIndustry || '';
    convTurn = state.convTurn || 0;
    // 隐藏欢迎页
    const welcome = document.querySelector('.welcome-msg');
    const guideTags = document.getElementById('guideTags');
    if(welcome) welcome.style.display = 'none';
    if(guideTags) guideTags.style.display = 'none';
    // 恢复消息
    state.messages.forEach(m => addMsg(m.role, m.html));
    return true;
  } catch(e){ return false; }
}

// ── 行业策略库(第一轮回答) ───────────
const DB = {
"烧烤":{cat:"餐饮",answ:`烧烤卖的不是肉串，是江湖气和人情味。记住——让你将来的客户管你叫哥，不是叫老板。

<div class="section-title">📹 日常引流</div>
<div class="shot-item"><b>①</b> 拍你凌晨去菜市场进货——蹲在肉摊前面用手捏一捏、凑近看一眼。这动作比你说一百句"我家肉新鲜"都有用。</div>
<div class="shot-item"><b>②</b> 拍你手工串肉——不是拍成品，拍串了一半的、手上全是油的。观众看的不是好不好看，是你是不是真自己串。</div>
<div class="shot-item"><b>③</b> 拍你烤不过来的样子——满头汗、烟熏得眯眼、手忙脚乱。这叫生意好。</div>
<div class="shot-item"><b>④</b> 拍你给每一桌送酒——不是服务员送，是你自己送。走到桌边说一句"这瓶算我的，喝好"。</div>
<div class="shot-item"><b>⑤</b> 拍你豪气地大吼——"今晚所有的消费由我买单！"站起来、举杯、对着全场喊。就这一个镜头。</div>

<div class="section-title">📹 同城搜索</div>
<div class="shot-item">店名、地址、营业时间打在每条标题上。号多弄一点——同城饱和式打击，别死磕一个号。</div>

<span class="highlight">肉串烤得一般的——把人情味拉满。技术一流的——当我放屁，你随便拍。抠抠搜搜的烧烤店等着倒闭。</span>`},

"美发":{cat:"美业",answ:`美发两条路。技术牛逼的走一条，技术一般的走另一条。

<div class="section-title">📹 有技术</div>
<div class="shot-item"><b>①</b> 拍造型前后变化——剪之前一张脸，剪之后同一张脸。三秒一个视频。客户自己会来。</div>
<div class="shot-item"><b>②</b> 第一视角拍剪发细节——你歪头看了3秒、又拿起剪刀修一下。客户看的不是发型，是你这个人认不认真。</div>

<div class="section-title">📹 没技术</div>
<div class="shot-item">卖护发精油、假发、染发膏、白变黑——拍使用前后对比。就这么简单。</div>
<div class="shot-item">拍顾客说"想换个颜色"，你上手操作，过程快剪，最后成品展示。换不同的人循环拍。</div>

<div class="section-title">📹 接本地客户</div>
<div class="shot-item">找几个朋友假装顾客，拍他们做完头发自己照镜子笑了的那一刻——不是摆拍的笑，是满意的笑。那个笑就是你最好的广告。</div>

<span class="highlight">一句话：有本事靠技术吃饭，没本事靠产品吃饭。都行。</span>`},

"卖酒":{cat:"零售",answ:`卖酒最重要的是ID。没有ID，酒再好也没人信你。

<div class="section-title">📹 建立信任</div>
<div class="shot-item"><b>①</b> 客户拿酒来回收——你看两眼直接说"你买的时候被人骗了，这个是假的"。然后教他怎么辨别真假，一个细节一个细节指给他看。全过程闲聊。</div>
<div class="shot-item"><b>②</b> 讲各种老酒的价值——对着酒瓶讲、对着标讲、对着酒花讲。别讲理论。</div>

<div class="section-title">📹 行业秘密（最吸引人）</div>
<div class="shot-item">"福建这边一旦会10块到20块的砸客户——这里面打的很脏，我这里不方便说。你硬要做，私下找我。"欲言又止的感觉。</div>

<div class="section-title">📹 搜索流量</div>
<div class="shot-item">短科普——怎么看酒花、怎么看年份、真假茅台的三个区别。讲清楚就行，不用花哨。</div>`},

"房产中介":{cat:"房地产",answ:`租房这块属于搜索绩效型赛道。你要做的第一件事不是想怎么拍——是弄到100个号，同城饱和式打击。

"纹身":{cat:"美业",answ:`纹身两种内容交叉做。

<div class="section-title">📹 第一种——搞笑引流</div>
<div class="shot-item">买奇怪的纹身贴——小猪佩奇、天线宝宝。顾客说要纹这个，你很诧异，最后还是纹了。</div>

"卖茶叶":{cat:"零售",answ:`茶叶最重要的——做ID。

<div class="section-title">📹 打信任</div>
<div class="shot-item"><b>①</b> 第一视角泡茶全流程——边泡茶边讲故事。茶叶的核心不是多好喝，是故事讲得好不好。故事讲好了，茶叶自然卖得好。</div>

<div class="shot-item"><b>③</b> 直播品种鉴定——边鉴定边卖自己的。自然就转过来了。</div>

"二手车":{cat:"汽车",answ:`<div class="section-title">📹 怎么引流</div>
<div class="shot-item">请100个精神小伙来试驾——骑之前戴着金链子歪脖子，戴头盔上车就是超帅机车少年。拍前后对比。反差就是流量。</div>

"宠物店":{cat:"服务",answ:`宠物做的是信任。

<div class="section-title">📹 引流</div>
<div class="shot-item"><b>①</b> 吐槽市场乱象——"这品相你跟我说纯的？"别点名。</div>
<div class="shot-item"><b>②</b> 展现各价位品相区别——不同价位的并排对比着讲。</div>
<div class="shot-item"><b>③</b> 客户返图——"来看看这是刚去新家的宝宝"。</div>

<div class="section-title">📹 成交</div>
<div class="shot-item"><b>①</b> 品种鉴定——拍你怎么辨别品相、健康、性格。边鉴定边介绍自家的。</div>
<div class="shot-item"><b>②</b> 直播品种鉴定——边鉴定边卖。转化最快。</div>`},

"清吧":{cat:"餐饮",answ:`清吧跟烧烤一个道理——背后都是人情味和江湖气。

<div class="shot-item"><b>①</b> 拍第一视角听最久的客户吹牛逼——日常打流量。</div>
<div class="shot-item"><b>②</b> 拍今晚全场消费你买单——站起来、举杯、大吼一声。</div>
<div class="shot-item"><b>③</b> 拍你给每桌送酒——自己送，不是服务员。走到桌边说"这瓶算我的"。</div>
<div class="shot-item"><b>④</b> 拍你每桌敬酒——跟熟人聊、跟新客寒暄。</div>

<span class="highlight">抠抠搜搜的清吧，等着倒闭。</span>`},

"摆摊":{cat:"餐饮",answ:`摆摊两条路线。

<div class="section-title">📹 第一种——展现赚钱</div>
<div class="shot-item">全部以钱为开头——"5块"→做一会→"您拿好"。"10块"→做一会→"您拿好"。中间穿插"排队排队，稍等一下"。要热闹，不热闹请托站边上。结尾算今天赚了多少。</div>

<div class="section-title">📹 第二种——剧情</div>
<div class="shot-item">学校门口摆摊。妈妈接孩子先自己吃，孩子想吃妈妈说垃圾食品别吃。第二天妈妈来买，你说是垃圾食品不卖她。她说要"大份的"，你说"好嘞"。一周两三条。</div>`},

"少儿培训":{cat:"教育",answ:`<div class="shot-item">第一视角严厉地去拍——谁不听话就严厉地改正他。家长把孩子给你是希望你帮他管好孩子。</div>
<div class="shot-item">记住——是严厉不是凶。中国家长在学习这块的心态你又不是不知道。不要太和善——和善了他会觉得你没在管。你只能先要能接受严厉这类家长。两个都要不可能。</div>`},

"舞蹈老师":{cat:"教育",answ:`舞蹈老师做视频有个天然优势——跳舞的画面好看。但这不等于你能接到学生。好看只是让人停下来，让人找你报名的是另一件事。

<div class="section-title">📹 三个方向轮着来</div>
<div class="shot-item"><b>① 技巧教学</b>——边上跟着一个学员，你教她做，她跟着做。一二三四、错了重来、对了点头。这种视频家长看了会觉得"这个老师是教你东西的，不是带着玩的"。这是招生的最佳内容。</div>
<div class="shot-item"><b>② 完整片段展示</b>——你站前面，后面一排学员。前三秒你教她们怎么跳，下一秒所有人跟你一起起舞。好不好看不重要——但一定要有<b>"一群人跟着你"的这个画面</b>。这个画面比你跳得好不好看重要得多。家长看的是"这么多人跟你学"。</div>
<div class="shot-item"><b>③ 你和单个学员的配合</b>——你和一个学员跳一小段。不用完美。家长看的是"你对自己学员的耐心程度"。</div>

<div class="section-title">📹 成人舞蹈 vs 儿童舞蹈</div>
<div class="shot-item">成人——拍学员上课时的专注和下课后的放松。成人学舞蹈不是要走专业，是来找一个"让自己开心"的东西。你拍她们笑、拍她们下课之后还在练——那个成就感是成人报班的第一动机。</div>
<div class="shot-item">儿童——拍孩子、更要拍家长接孩子的时候看到孩子进步的表情。家长要的不是孩子多厉害——是孩子开心、自信了。</div>

<div class="section-title">🎯 同城怎么打</div>
<div class="shot-item">舞蹈培训是强同城。城市名+舞蹈培训/少儿舞蹈/成人舞蹈。每条视频的标题和话题打上位置。号多弄几个。发得越勤、搜到你的家长越多。</div>

<span class="highlight">你跳得好不好不是招生决定因素。家长真正想看的是"我家孩子跟着你学，会是什么样子"。</span>`},

"汽修":{cat:"汽车",answ:`<div class="section-title">📹 两条路</div>
<div class="shot-item"><b>①</b> 把牙刷的卖了——弄个整备车间，旧车收拾干净再卖。利润高了就不用拍视频了。</div>
<div class="shot-item"><b>②</b> 找演员找台车——本质就是听醉酒的大哥吹牛逼。结尾记录今天赚多少。全国各地都能抄。</div>`},

"家电清洗":{cat:"家政",answ:`家电清洗就一个字——"拆"。你敢拆、会拆，客户就觉得你专业。

<div class="section-title">📹 怎么拍（三个画面循环）</div>
<div class="shot-item"><b>①</b> 拆机之前先拍——一台脏到不行的空调/洗衣机/油烟机。镜头对着最脏的那个角落停两秒。这叫"视觉对比的锚点"。</div>
<div class="shot-item"><b>②</b> 拆开之后拍——里面的脏东西。滤网上的灰、内筒里的垢。说一句话就行："你家用了三年的空调，里面就长这样。"不用多，一句够了。</div>
<div class="shot-item"><b>③</b> 洗完装回去拍——同一个角度、同一个位置拍。跟拆之前对比。别说话，让画面自己对比。</div>

<div class="section-title">📹 同城怎么推</div>
<div class="shot-item"><b>①</b> 每条标题带上"城市名+家电清洗"——同城搜索就靠这个。不用花哨，就是关键词。</div>
<div class="shot-item"><b>②</b> 号多开几个——不要死磕一个号。一个号跑起来就复制到下一个号，封面换一下、音乐换一下，内容一模一样推。</div>
<div class="shot-item"><b>③</b> 价格直接打在评论区置顶——"空调清洗XX、洗衣机XX、油烟机XX"。让想找你的人一眼就看到多少钱。</div>

<div class="section-title">💰 怎么变现</div>
<div class="shot-item">同城客户看完视频直接私信你。你不用管视频火不火——你只需要同城有需要的人搜到了你。一条视频一百个播放，有一个人私信你——这就不亏。家电清洗的客户客单价高、复购高，洗一次满意了明年还找你。所以每条视频背后都是在攒回头客。</div>

<div class="section-title">🎯 怎么做出差异化</div>
<div class="shot-item">所有人都在拍洗完之后的对比。你就多加一步——<b>洗完之后你教客户怎么日常保养</b>。比如洗空调的时候告诉他"滤网你每个月拿出来冲一下，就这个位置，很简单"。客户会觉得你在为他着想，不是只想赚他一次钱。这种感觉比"我洗得干净"有用得多。</div>

<span class="highlight">记住——家电清洗这行所有的信任都在你拆开机器的那一刻。你敢拆，他就觉得你透明。你不敢拆，他总觉得你糊弄。</span>`},

"家具":{cat:"零售",answ:`家具这东西——你不能只拍家具。你得拍"这个家具放在家里是什么感觉"。

<div class="section-title">📹 三种拍法轮着来</div>
<div class="shot-item"><b>① 沉浸式布置</b>——第一视角拍你把一张桌子、一组沙发放进一个空房间。从空房间到布置完，中间快剪。最后镜头慢慢扫一圈。配轻音乐。不要说任何话。这叫"让别人想象这个东西在他家的样子"。</div>
<div class="shot-item"><b>② 价格透明化</b>——"一套沙发多少钱、一张床多少钱、一个餐桌多少钱"。直接报——"这个XX钱、那个XX钱"。比你说一万句"我家性价比高"有用。客户要的不是便宜，是<b>不用猜</b>。</div>
<div class="shot-item"><b>③ 教人选家具</b>——"怎么看板材""怎么看五金""怎么看沙发填充物"。就讲一个点，三十秒。客户看完觉得自己学会了怎么判断好坏。他下次选家具的时候脑子里想的就是你。</div>

<div class="section-title">📹 同城怎么打</div>
<div class="shot-item">家具是典型的同城搜索生意。每条标题带上"城市名+家具"。号越多越好。还可以找几个美女帅哥过来你店里坐一坐、拍一拍——画面有人气。</div>

<div class="section-title">💰 变现路径</div>
<div class="shot-item">本地客户看视频→私信问"你店在哪"→到店体验→成交。家具客单价高，一条视频一年能给你带几个客户就够了。如果产品有特色，还可以往全国发货——拍你打包发货的过程，配一句"广东发到黑龙江，三天到，这个沙发坐上去就不想下来"。</div>

<span class="highlight">家具的核心不是便宜。是让客户觉得"买了不后悔"。你所有的视频都在讲一件事——买了不会后悔。</span>`},

"少儿培训":{cat:"教育",answ:`少儿培训做视频有个底层逻辑——你的客户不是孩子，是孩子的爸妈。你要打动的不是孩子喜不喜欢上课，是<b>爸妈觉得你这个人靠不靠谱</b>。

<div class="section-title">📹 三种内容方向</div>
<div class="shot-item"><b>① 严厉管教的画面</b>——第一视角拍你在纠正一个学生的动作/坐姿/握笔姿势。语气严肃但不凶。"手再往上一点""这个要重来"。家长看到这个画面对你只有一种感觉——"你是真的在管孩子"。中国家长最吃这一套。</div>
<div class="shot-item"><b>② 成果展示</b>——拍一个孩子之前什么样、跟你学了一段时间之后什么样。不用你说"我的教学效果好"，让家长自己看。</div>
<div class="shot-item"><b>③ 你在备课/准备教具的过程</b>——拍你晚上自己在教室里整理教材、画板书、准备第二天要用的东西。这个画面告诉家长一件事——"你不是在应付"。这比你说一万句"我用心"都有用。</div>

<div class="section-title">⚠️ 注意</div>
<div class="shot-item"><b>是严厉不是凶。</b>严厉是你有标准、你要求他做到。凶是你情绪上头了。家长能分辨的。你只能先要能接受严厉这类家长——两个都要是不可能的。</div>

<div class="section-title">🎯 同城打法</div>
<div class="shot-item">少儿培训是强同城的生意。店名、地址、课程、价格——每条视频打上去。家长不会跨城市给孩子报班。同城搜索：机构名+培训类型+城市名。号一定要多。</div>

<span class="highlight">记住——你的每条视频都在回答一个家长没说出口的问题："我把孩子交给你，你到底靠不靠谱？"</span>`},

"汽修":{cat:"汽车",answ:`汽修做视频说容易也容易——会修车的人天然有信任感。说难也难——很多人只会修不会讲。

<div class="section-title">📹 三条路线</div>
<div class="shot-item"><b>① 整备翻新</b>——找一台旧车，拍你从拆到整备到装回去的全过程。不用讲太多话，镜头对着你干活的手。中间一个快剪，最后成品展示。这种视频天然的爽感——像看人把一个破烂修成新的。一条好看，观众会从头看到尾。</div>
<div class="shot-item"><b>② 听客户吹牛逼</b>——找演员找台车也行，真实客户也行。本质就是听开车的人吹牛逼——"这车我当时多少钱收的、怎么改的、现在值多少"。结尾记录你今天赚了多少。这种内容全国各地都能抄。</div>
<div class="shot-item"><b>③ 教人看车</b>——"怎么看发动机有没有动过""怎么看是不是事故车""二手车的这三个螺丝你去看一眼就知道"。每条约短越好。这是同城搜索流量最好的内容——因为想买车的人天天在搜"怎么看二手车"。</div>

<div class="section-title">🎯 乡镇玩法</div>
<div class="shot-item">你是乡镇的话——打关系。每个来店里的人都采访他：做什么的、怎么赚钱的、为什么能开这么好的车。闲聊的方式。结尾说"车保养得很好"。做上100条，这个镇上的人基本都知道你了。</div>

<div class="section-title">💰 变现</div>
<div class="shot-item">能整备翻新卖车的——把牙刷的卖了，利润高了不用拍视频都行。做维修保养的——同城搜索流量直接给你带客户。修车这行的信任是最容易建立的——因为你打开引擎盖的那一下，客户看的是你的手在摸什么。</div>`},

"蛋糕店":{cat:"餐饮",answ:`蛋糕这个品类特别好拍——因为<b>做的过程本身就是内容</b>。

<div class="section-title">📹 三种内容</div>
<div class="shot-item"><b>① 做蛋糕全过程</b>——打蛋、搅拌、入模、出炉、抹面、裱花。中间快剪，最后成品展示一个慢镜头。全程不说话、只配轻音乐。这种视频天然适合抖音——看着解压、看完想转发。不需要你想创意，就拍你今天做的东西就行。</div>
<div class="shot-item"><b>② 客户定制对比</b>——客户发来一张图"我想要这样的"，你把你做出来的成品跟原图放在一起对比。"客户想要这样的，我做出来了"——就这一句话。这是你技术最好的广告。</div>
<div class="shot-item"><b>③ 翻车+修复</b>——你做坏了一个蛋糕、奶油塌了、裱花歪了。先拍你有点懊恼的表情、再看你重新做了一遍、最后做好了。这个情绪起伏比一个完美的蛋糕好看一百倍。观众想看的不是神仙——是想看一个会翻车但能修回来的人。</div>

<div class="section-title">🎯 同城怎么打</div>
<div class="shot-item">店名、地址、价格——每条视频打上去。蛋糕是典型的"刷到就想吃"的品类。你不需要追求全国流量——同城有人刷到你的蛋糕视频、刚好明天有人过生日、他就私信你了。这叫冲动转化。</div>

<div class="section-title">💰 变现</div>
<div class="shot-item">同城订蛋糕——这是你的基本盘。如果能做全国发货的品类（饼干/甜品礼盒），视频里顺带一句"这个可以发快递"。不用硬卖，自然带。</div>`},

"花店":{cat:"零售",answ:`花店做视频。花本身好看——但光拍花是不够的。你要给人一个"我也想要"的理由。

<div class="section-title">📹 三种方向</div>
<div class="shot-item"><b>① 包花过程</b>——从一把散花到一个成品花束，中间一个快剪。配温柔音乐。这是日常打流量用的。每天一条，不用多想。</div>
<div class="shot-item"><b>② 讲故事</b>——"今天来了个男生，进来站了三分钟不知道选什么。我问他送给谁，他说...（你编一个合理的故事）。最后他选了这束。"花本身没有故事，但买花的人有故事。你把故事讲出来，花就不只是花了。</div>
<div class="shot-item"><b>③ 深夜施肥/养护</b>——深夜偷偷去别人的菜地/果园，给其中一株专门施肥，这株长得比别人快、结果比别人好。这个方向做TOC的内容——养绿植、养鲜花的人越来越多，你教他们怎么把花养活、养好。</div>

<div class="section-title">🎯 同城怎么打</div>
<div class="shot-item">花店是强同城的——没人会从别的城市订一束花发快递。店名、地址打上去。同城搜索：城市名+花店。</div>

<div class="section-title">💰 变现</div>
<div class="shot-item">① 包花束——同城配送或自取。② 绿植盆栽——可以卖到全国。③ 养花教学——做知识付费。你是花店老板，你说的话天然有说服力。三条路选一条最擅长的。</div>

<span class="highlight">花的本质不是商品——是表达。你拍的不是花，是送花那个人说不出口的话。</span>`},

"民宿":{cat:"酒店",answ:`民宿这个东西——拍的不是房间，是<b>一种区别于你日常的生活</b>。

<div class="section-title">📹 怎么拍</div>
<div class="shot-item"><b>① 身份+故事比房间重要</b>——"研究生毕业，没去上班，在XX山里开了一间民宿"。先说你是谁、你为什么做这个，再拍你的民宿。观众先对你这个人感兴趣了，才会对你的房间感兴趣。</div>
<div class="shot-item"><b>② 拍别人向往的生活状态</b>——清晨在院子里喝茶、傍晚在阳台看日落、晚上在壁炉旁边看书。不拍房间多大多少钱——拍"住在这里的人是怎么过的"。观众买的不是住宿，是"我也想过两天这样的日子"。</div>

<div class="section-title">🎯 怎么吸引外地客户</div>
<div class="shot-item">带城市名+民宿关键词。拍你周边的风景——"从民宿走路三分钟就到这片湖""推开窗看到的就是这座山"。外地游客搜你城市民宿的时候能找到你。</div>

<div class="section-title">⚠️ 没生活态度就别拍了</div>
<div class="shot-item">如果你的民宿就是普通的房子——没有风景、没有故事、没有特别的装修风格。那视频这条路不适合你，你把钱投在OTA平台上买流量更划算。视频适合那些"值得被拍出来"的民宿。</div>`},

"钓鱼":{cat:"户外",answ:`钓鱼这个品类好做——天然有画面感、天然有期待感。你不知道今天能不能钓到，这种不确定性就是最好的内容。

<div class="section-title">📹 三种方向</div>
<div class="shot-item"><b>① 出门前被老婆骂</b>——"今天钓不到鱼就别回来了"。然后第一视角拍你去了、没钓到。去菜市场买鱼回家做给老婆吃。老婆吃完说"野生的就是比菜市场香"。拍出老婆傻傻的不知道的样子。换不同的鱼、不同的菜场、不同的做法反复拍。这是纯搞笑的引流内容。</div>
<div class="shot-item"><b>② 纯技术流</b>——教人怎么选钓位、怎么配饵料、怎么看天气、怎么看水流。每条一个技术点。钓鱼的人愿意花很长时间看这类内容。你不靠量——靠"你讲的东西别人没讲过"。</div>
<div class="shot-item"><b>③ 第一视角沉浸</b>——一早出发、到达钓点、架竿、等鱼、中鱼、遛鱼、上岸。全程第一视角，不说话或偶尔说一句。这种像ASMR一样的内容在钓鱼圈很吃香。</div>

<div class="section-title">💰 怎么变现</div>
<div class="shot-item"><b>①</b> 卖钓具——你用什么竿、用什么饵，视频里顺带说一句"这个在我主页可以看"。<b>②</b> 带人去钓鱼——收费组队。你出技术带路，他们出钱出人。你的视频就是你的广告。</div>`},

"洗车":{cat:"汽车",answ:`洗车做视频有个天然优势——<b>视觉对比极其强烈</b>。脏的进来、干净的出去，这个反差本身就是最好的内容。

<div class="section-title">📹 怎么拍</div>
<div class="shot-item"><b>① 前后对比</b>——一台脏车开进来，镜头绕一圈拍它多脏。中间快剪你的清洗过程。最后同一台车同一个角度——亮的反光。全程不用说话，让画面自己说话。</div>
<div class="shot-item"><b>② 细节特写</b>——拍你清洗一个别人容易忽略的细节——轮毂内侧、车门铰链、发动机舱角落。说一句话："这个地方，大部分洗车店不会碰。"这句话说出去——看过的人下次洗车会专门看你有没有洗这个地方。</div>
<div class="shot-item"><b>③ 各种奇葩车况</b>——"今天来了一台车，车主说半年没洗了"。拍你面对一台特别脏/特别贵的车时的反应和清洗过程。车越脏越好看。</div>

<div class="section-title">🎯 同城怎么打</div>
<div class="shot-item">同城搜索流量——不需要自己拍爆款。直接找同行的视频混剪，同城本地推就行了。号多弄一点——洗车这行不需要一条视频爆，需要的是同城想洗车的人搜到你。号多、发得勤——谁搜洗车都能看到你。</div>

<div class="section-title">💰 变现</div>
<div class="shot-item">洗车本身客单价低。真正的钱在美容和养护——镀晶、贴膜、内饰清洁。洗完车顺带一句"下次可以做个内饰深度清洁，这个座椅我帮你看看"。视频带客户进门，后面的服务留下客户。</div>`},

"成人用品":{cat:"零售",answ:`成人用品这个类目——你没法正儿八经拍产品。但你能拍"跟产品有关的人的反应"。

<div class="section-title">📹 能拍什么</div>
<div class="shot-item"><b>① 开箱/拆包裹</b>——拍你收到配品的过程。不是产品本身——是配品。比如配品里收到黄金项链、收到一袋子现金。你拆包裹的反应——惊讶、不敢相信、赶紧拿起来看。观众想知道的是"买成人用品送啥"——这个好奇心就够流量了。</div>
<div class="shot-item"><b>② 奇葩客户投稿</b>——让你的客户匿名投稿他们遇到的最离谱的事。你对着镜头念。不拍产品、不露脸——就念投稿。每一条都是一集故事。</div>
<div class="shot-item"><b>③ 科普/破除尴尬</b>——"第一次买成人用品是什么体验""怎么选对的东西"。用科普的方式把尴尬消解掉。你越是大大方方地讲，观众越信你。</div>

<div class="section-title">⚠️ 注意事项</div>
<div class="shot-item">抖音对这个类目有限制。别拍产品特写、别拍使用过程。拍反应、拍故事、拍聊天。你在卖的是"不用尴尬的购物体验"——不是产品本身。</div>

<div class="section-title">💰 怎么变现</div>
<div class="shot-item">视频引流→主页/私信→电商成交。产品上架到拼多多/淘宝，视频里不提平台名，说"想要的私信我"。</div>`},

"卖牙刷":{cat:"零售",answ:`牙刷这东西——利润薄、竞争大、没壁垒。如果把牙刷的卖了，把摊收了，把精力投到利润率更高的东西上去——你可能早就百万富翁了。

但如果你非要做，也不是完全没路：

<div class="section-title">📹 非要做的话</div>
<div class="shot-item"><b>①</b> 不走零售，走批量——找酒店、民宿、牙科诊所谈批量供应。视频拍你送货的过程："今天给XX酒店送了2000套"。让人觉得你是做批发的。</div>
<div class="shot-item"><b>②</b> 走差异化——不是普通牙刷，是电动牙刷、儿童牙刷、有IP联名的牙刷。找有话题性的产品，不卖白牌。</div>

<div class="section-title">💰 诚实建议</div>
<div class="shot-item">牙刷这个品类，做视频的投入产出比太低。把时间花在选一个更好的品类上——比花在拍牙刷视频上值钱得多。如果你手里有同城的渠道关系，直接走地推比走视频快。</div>`},

"蛋糕店":{cat:"餐饮",answ:`<div class="section-title">📹 怎么拍</div>
<div class="shot-item"><b>①</b> 拍做蛋糕全过程——打蛋、搅拌、入模、出炉、裱花，中间快剪，最后成品。手艺好就是最好的广告。</div>
<div class="shot-item"><b>②</b> 客户定制对比——"客户想要这样的，我做出来了"。就这种。</div>
<div class="shot-item"><b>③</b> 店名地址打标题上。同城搜索流量。号多弄一点。</div>`},

"花店":{cat:"零售",answ:`<div class="section-title">📹 两个方向</div>
<div class="shot-item"><b>①</b> 拍包花过程——从散花到成品，中间快剪。配温柔音乐。日常打流量。</div>
<div class="shot-item"><b>②</b> 深夜偷偷去别人菜地/果园——给其中一株专门施肥，这株长得比别人快结果比别人多。最好增加绿植鲜花的比例。做TOC。</div>`},

"民宿":{cat:"酒店",answ:`拍别人向往的生活和生活态度。没有就别拍了——除非你有不一样的优势或身份背书。

<div class="shot-item">把研究生身份作为主要身份——研究生日常兼职如何养活自己还不耽误学业。身份和故事比民宿本身好看。</div>`},

"钓鱼":{cat:"户外",answ:`<div class="section-title">📹 这个方向画面感很强</div>
<div class="shot-item">出门前被老婆骂——"今天钓不到鱼就别回来了"。第一视角没钓到。去菜市场买鱼回家做给老婆吃。老婆吃完说"野生的就是比菜市场香"。拍出老婆傻傻的样子。换不同的鱼、不同的菜场、不同的做法反复拍。</div>`},

"家具":{cat:"零售",answ:`拍别人向往的生活和生活态度。没有就别拍了——除非你有不一样的优势或身份背书。介绍场地、服务设施、价格。同城饱和式打击。找几个美女帅哥过来坐坐拍拍，效果更好。`},

"洗车":{cat:"汽车",answ:`同城搜索流量——不需要自己拍，直接找同行视频混剪。同城本地推。号多弄一点。饱和式打击。`},

"成人用品":{cat:"零售",answ:`配品里收到黄金项链。配品里收到一袋子现金。拍你拆包裹的反应——惊讶、不敢相信、赶紧拿起来看。就这个。`},

"卖牙刷":{cat:"零售",answ:`把牙刷的卖了，你就是百万富翁了。还拍啥拍。`},

"知识付费":{cat:"知识",answ:`知识付费这行——不同方向做法完全不同。但有一件事是通用的：<b>你的内容就是你的产品展示页</b>。

<div class="section-title">📹 按你的领域对号入座</div>
<div class="shot-item"><b>会计/律师/财税类</b>——做短科普。每条视频一个知识盲区："大多数老板不知道的一笔税""你签合同不看这一条就可能赔钱"。这种内容天然让人想收藏转发。你讲得越多，找你咨询的人越多。同城搜索流量靠关键词打。</div>
<div class="shot-item"><b>课程/训练营类</b>——先做内容引流，再做私域转化。视频里不要卖课，视频里给价值。结尾自然留口子——"想继续学的，私信我"。一个视频换一个私信，十个私信转化一个付费。</div>
<div class="shot-item"><b>咨询/陪跑类</b>——展示客户的结果。不是展示你的结果——是展示客户的结果。"上个月来找我的一个学员，三个月前他是什么样，现在是什么样"。不用你说你的服务值多少钱，让结果说话。</div>

<div class="section-title">🎯 最关键的</div>
<div class="shot-item">做知识博主，你先问自己一个问题——"别人为什么要听我讲这个？"你是做过这个行业、还是考过这个证、还是踩过这个坑？你的经历就是你最大的背书。别藏着——你的第一条视频就应该告诉你大家你是谁、你做过什么、你为什么有资格讲这个东西。</div>

<div class="section-title">⚠️ 实话</div>
<div class="shot-item">做短视频最可怕的不是没技术——是你困在自己的认知里面打转。为什么别人能快速起号快速变现？他们有圈子、有前辈带路，你在黑暗中摸索。其实就是一层窗户纸——找对人点拨几分钟的事。何必浪费几个月。先学会入圈。</div>`},

"火锅":{cat:"餐饮",answ:`火锅跟烧烤一个道理——卖的不是那口锅，是"一群人坐在一起不想走"。

<div class="section-title">📹 怎么拍</div>
<div class="shot-item"><b>① 拍锅底沸腾</b>——红油翻滚、热气往上冒、筷子伸进去。不用说话，让画面自己说。火锅视频靠<b>食欲</b>——你让观众隔着屏幕闻到味道，他就想来了。</div>
<div class="shot-item"><b>② 拍一家人吃</b>——不是摆拍。大人涮肉、孩子喝饮料、桌上一片狼藉。这个画面说的是——"这里一家人都能来"。</div>
<div class="shot-item"><b>③ 拍蘸料台扫一圈</b>——"十六种蘸料你自己调"。蘸料台是火锅店的第二张脸。</div>
<div class="shot-item"><b>④ 拍门口排队的人</b>——高峰期有人站着等。这就是最好的广告。</div>

<span class="highlight">火锅店怕的不是没人来——怕来了坐不住、不想再来。你的视频解决第二个问题。</span>`},

"奶茶":{cat:"餐饮",answ:`奶茶店——就拍三样：做、喝、排队。

<div class="section-title">📹 怎么拍</div>
<div class="shot-item"><b>① 拍制作过程</b>——雪克杯摇晃、奶茶流出来、奶盖铺上去。天然解压。配轻音乐，不说话。</div>
<div class="shot-item"><b>② 拍第一口的反应</b>——找朋友拍。"给你买了杯新品你尝尝"...喝了一口眼睛亮了。这比喊一万句"好喝"有用。</div>
<div class="shot-item"><b>③ 拍出单台上堆积的杯子</b>——高峰期一堆杯子排在那。"看看今天最奇葩的备注写的啥"。</div>

<span class="highlight">奶茶是冲动消费——刷到就想喝。你不需要爆，你需要同城想喝的时候搜到你。</span>`},

"美甲":{cat:"美业",answ:`美甲好看就够了一半。另一半是让客户觉得<b>你懂她想要什么</b>。

<div class="shot-item"><b>① 成品展示</b>——一只手慢慢转，光线打上去。三秒一个视频。技术就是最好的广告。</div>
<div class="shot-item"><b>② 客户拿图来你复刻</b>——"她拿来这张图想要这个感觉，我做出来了"。</div>
<div class="shot-item"><b>③ 拍聊天</b>——"今天为什么选这个颜色？""明天去见前男友"。客户的故事比指甲好看。</div>

<span class="highlight">美甲店一个满意客户会带三个朋友来。视频就是你的门面。</span>`},

"酒吧":{cat:"餐饮",answ:`酒吧卖的不是酒，是<b>"今晚有人懂我"</b>。

<div class="shot-item"><b>① 拍调酒过程</b>——手在动、酒在倒、冰块在响。第一视角，不拍脸。解压又吸引人。</div>
<div class="shot-item"><b>② 听客户吹牛逼</b>——一个客人喝着酒讲自己的故事。你不用说话。结尾他走了你对着镜头笑一下。</div>
<div class="shot-item"><b>③ 全场消费你买单</b>——站起来、举杯、大吼一声。就这一个镜头。</div>

<span class="highlight">酒吧靠回头客。每条视频都在说——"这里有个懂你的人"。</span>`},

"婚庆":{cat:"服务",answ:`婚庆拍的不是道具，是<b>一个女人一生中最重要的一天</b>。

<div class="shot-item"><b>① 新娘化妆过程</b>——镜子里的她、妈妈在旁边看着、闺蜜帮整理头纱。这些画面比你喊口号有用一万倍。</div>
<div class="shot-item"><b>② 婚礼现场布置</b>——从空场地到布置完。"这个新娘说她想要什么感觉——我做出来了"。</div>
<div class="shot-item"><b>③ 最打动你的瞬间</b>——不是接吻，是爸爸红着眼把女儿手递出去。你拍到了那一下。</div>

<span class="highlight">新娘订了日子开始疯狂搜——你的视频就是她搜到的第一个。</span>`},

"月嫂":{cat:"家政",answ:`月嫂——产妇找你不是因为你证书多，是<b>她觉得把孩子交给你能睡着觉</b>。

<div class="shot-item"><b>① 拍你干活的手</b>——怎么抱孩子、拍嗝、洗澡、做抚触。第一视角。不说话。就是"你看我怎么对你的孩子"。</div>
<div class="shot-item"><b>② 教新手爸妈一个技巧</b>——"宝宝哭了怎么判断饿还是困""拍嗝总拍不出来怎么办"。一条一个。她看完觉得这人真懂。</div>
<div class="shot-item"><b>③ 你走的时候客户不舍的样子</b>——不是你演的。她跟你说了一句什么话。就拍那一句。</div>

<span class="highlight">月嫂靠口碑。你的视频就是你的简历。宝妈们会一条一条翻到找到那个让她觉得"可以"的。</span>`},

"搬家":{cat:"家政",answ:`搬家所有人都在拼价格。你拼<b>一个细节</b>就能赢。

<div class="shot-item"><b>① 拍打包过程</b>——怎么分类、怎么标记、怎么保护易碎品。"这箱厨房的、这箱卧室的——搬过去对着标签放就行"。客户觉得你不是来搬东西的——是来帮他解决麻烦的。</div>
<div class="shot-item"><b>② 拍最难的瞬间</b>——钢琴下楼、大沙发过转角、四个箱子搬上六楼没电梯。</div>
<div class="shot-item"><b>③ 搬完后客户的表情</b>——"全搬完了你看看"。客户站在新家中间看着整整齐齐的东西。那个表情就是最好的广告。</div>

<span class="highlight">搬家是即时决策——今天看到明天打电话后天搬家。同城搜索：城市名+搬家。</span>`},

"全屋定制":{cat:"装修",answ:`全屋定制不卖板材。卖<b>"这就是我想要的那个家"</b>。

<div class="shot-item"><b>① 拍安装全过程</b>——从一堆板材到装好。中间快剪。客户看的是安装师傅<b>认不认真</b>——封边的细节、拼的时候用不用心。</div>
<div class="shot-item"><b>② 同户型前后对比</b>——"这个户型跟你家一模一样——装之前这样，装完这样"。同户型的客户看完就想找你。</div>
<div class="shot-item"><b>③ 教人看板材</b>——"怎么看封边、怎么看五金、怎么看环保等级"。你讲得越细，客户越觉得你专业。</div>

<span class="highlight">高客单价生意。一条视频一年带几个客户就够了。城市名+全屋定制。</span>`},

"瓷砖":{cat:"装修",answ:`瓷砖所有人都在晒铺好的效果。你反过来——晒<b>铺的过程</b>。

<div class="shot-item"><b>① 拍铺贴全过程</b>——师傅怎么切砖、找平、留缝、对花纹。一个镜头拍到底。客户看的是手指抹过去平不平、缝对得齐不齐。</div>
<div class="shot-item"><b>② 教人选砖</b>——"亮光和哑光的区别""柔光砖打理什么体验""客厅铺多大最合适"。对着砖讲。</div>
<div class="shot-item"><b>③ 不同价位对比</b>——三块砖放一起。"这块多少钱、这块多少钱——你能看出区别吗"。让客户自己看。</div>

<span class="highlight">瓷砖靠装修师傅和设计师带客户。视频让你被更多人知道。城市名+瓷砖。</span>`},

"瑜伽":{cat:"健身",answ:`瑜伽——你身体就是最好的广告。

<div class="shot-item"><b>① 日常练习片段</b>——不用完美。你专注的样子比标准体式好看。观众看的是你的<b>状态</b>。</div>
<div class="shot-item"><b>② 教学带学员</b>——"一个动作改善圆肩""睡前三个动作睡得好"。边上带一个学员跟着做。这种招生成交率最高——因为学生/家长看到了你教学的样子。</div>

<span class="highlight">夏天每天发。城市名+空调维修/空调清洗。你需要同城搜空调维修的人找到的是你。</span>`},

"化妆跟妆":{cat:"美业",answ:`化妆师——最重要的作品是<b>你给别人化的那张脸</b>。

// ── 追问知识库(第二轮以后基于行业和关键词) ──
function getFollowup(question, industry, cat){
  const q = question.replace(/\s/g,'');
  const icat = cat||'';

  // 刚开/新手/没经验
  if(q.includes('刚开')||q.includes('新手')||q.includes('没经验')||q.includes('刚开始')||q.includes('新店')){
    if(icat==='餐饮') return `刚开的话，前两周就做一件事——<span class="highlight">每天发一条</span>，内容就拍你店里最真实的那个瞬间。你凌晨去菜市场、你备菜的样子、你第一桌客人进来的时候。不用剪辑、不用配乐、不用字幕。抖音会给你第一波同城流量——你只要能坚持两周，算法就开始认识你了。\n\n<div class="shot-item">记住啊，新店最容易犯的错是一上来就想出爆款。爆款是量的结果，不是技巧的结果。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('不想露脸怎么办')">不想露脸</button><button class="followup-btn" onclick="quickFollow('发了没人看怎么办')">没人看</button><button class="followup-btn" onclick="quickFollow('同行太多了怎么做出差别')">同行太卷</button></div>`;
    if(icat==='美业') return `刚入行——先不急着拍技术。先拍你<b>练习的过程</b>。你做坏了的样子、你不太满意又重来一遍的样子。观众看的不是你技术多好，是你这个人是不是真的在学。真诚比技术更能拉新客。\n\n<div class="shot-item">前两周就拍一条：你今天练了什么、哪里没做好、打算怎么改。就这三句。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('怎么让客户觉得我靠谱')">建立信任</button><button class="followup-btn" onclick="quickFollow('不想露脸怎么办')">不想露脸</button></div>`;
    if(icat==='零售') return `刚入行，第一步不是拍视频——是搞清楚<b>你比隔壁那家好在哪</b>。想不出来就别急着拍。想出来了——把你那个"不一样"拍成一句话。\n\n<div class="shot-item">你做${industry}，你的客户在找你之前最怕什么？你把这个东西说出来，就是你的第一条视频。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('怎么找到我跟同行的区别')">找区别</button><button class="followup-btn" onclick="quickFollow('发了没人看怎么办')">没人看</button></div>`;
    return `刚入行——先别急着拍。第一件事：搞清楚<b>你的客户最怕什么。</b>你做${industry}，你的客户在找你之前最怕踩什么坑？想出来了——你的第一条视频就是告诉他"我知道你在怕什么"。\n\n<div class="shot-item">还没想出来的话你告诉我——你的客户一般问你什么问题问得最多？</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('不想露脸怎么办')">不想露脸</button><button class="followup-btn" onclick="quickFollow('怎么变现收钱')">怎么收钱</button></div>`;
  }

  // 不想露脸/不出镜
  if(q.includes('露脸')||q.includes('出镜')||q.includes('不想拍自己')||q.includes('害羞')||q.includes('不敢拍自己')||q.includes('不好意思出镜')){
    return `不想露脸完全没问题——做${industry}有很多不用脸的内容。

<div class="shot-item"><b>①</b> 第一视角拍你的手在干活。从头到尾不拍脸。只要你的手在动、在做东西——观众自己会脑补。</div>
<div class="shot-item"><b>②</b> 拍你的产品/环境。用手机慢慢扫一圈，配一段你自己的录音（录音就行，不用出镜）。</div>
<div class="shot-item"><b>③</b> 让别人出镜——你有员工、搭档、朋友吧？让他们当主角，你拍他们。</div>

<span class="highlight">观众在乎的是你给的东西值不值，不是你长什么样。</span>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('不露脸怎么让人信任我')">不露脸怎么建立信任</button><button class="followup-btn" onclick="quickFollow('怎么变现收钱')">怎么收钱</button></div>`;
  }

  // 同行竞争/内卷/差异化
  if(q.includes('同行')||q.includes('竞争')||q.includes('内卷')||q.includes('卷')||q.includes('区别')||q.includes('差异化')||q.includes('不一样')||q.includes('怎么做出')||q.includes('怎么做出差别')){
    return `你说到点子上了。同行太多这个问题——其实不是同行太多，是<b>你们都在拍一样的东西</b>。

<div class="shot-item">你打开抖音搜你的行业——看看排在前面的视频都在拍什么。所有人在拍的东西，就是你的同行眼里"该拍的"。<b>没人拍的那个角度，就是你的缺口。</b></div>

<div class="shot-item">比如做${industry}的——所有人都在拍成品、拍技术、拍价格。但你的客户真正想知道的是什么？可能是"怎么判断你靠不靠谱"、"为什么要选你而不是隔壁那家"、"你贵在哪"。这三个问题——你的同行有人拍了吗？没有的话，你就拍这个。</div>

<div class="shot-item">你现在就打开手机看看你同行的视频——告诉我他们全都在拍什么。我帮你想一个他们没在拍的角度。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('同行都在打价格战怎么办')">价格战</button><button class="followup-btn" onclick="quickFollow('怎么让客户看完就找我')">看完就想找我</button></div>`;
  }

  // 价格战
  if(q.includes('价格战')||q.includes('便宜')||q.includes('降价')||q.includes('比价')||q.includes('他比我便宜')){
    return `价格战是这样的——<b>你跟别人比价格，你永远在让利。你跟别人比不一样，你永远在涨价。</b>

做${industry}的，打价格战只有一种情况你能赢——你的成本真的比别人低很多。如果不是，别打。

<div class="shot-item"><b>不降价能怎么办？</b>找一个别人不愿意做、做不了、或者没想过要做的点。比如你做家电清洗——所有人拼价格，你就比他们多做一步：洗完教客户"滤网怎么自己保养"。这一句话成本是零，但客户会觉得你跟别人不一样。下一次他还找你。价格战拼的是谁先死。"不一样"拼的是谁活得久。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('不降价怎么让客户选我')">不降价怎么赢</button><button class="followup-btn" onclick="quickFollow('同行太多了怎么做出差别')">找差异化</button></div>`;
  }

  // 信任/靠谱
  if(q.includes('信任')||q.includes('靠谱')||q.includes('怎么让人信')||q.includes('怎么让人觉得')){
    return `信任这个东西，不是你说出来的——是你<b>做出来、被别人看到的</b>。

<div class="shot-item">你打开手机录一段你干活的过程。你干活的时候会不会有一个动作——比如你检查了一遍之后又检查了一遍、你不太满意又改了改、你做完之后对着自己做的这个东西看了几秒。这些瞬间，就是信任。你不需要对着镜头说"我这个人很靠谱"——你只需要让观众看到你是怎么干活的。</div>

<div class="shot-item">还有一个最容易让陌生人信任你的方法——<b>先讲缺点再讲优点。</b>比如"这个房子采光很好，但厨房有点小，你要是天天做饭可能不太方便"。你先把不好的主动说了，客户就知道你没在骗他。后面你说好的他才会信。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('有没有具体的信任建立方法')">具体怎么做</button><button class="followup-btn" onclick="quickFollow('怎么变现收钱')">怎么收钱</button></div>`;

    return `做${industry}这个行业的变现，核心就一个——<b>先让别人觉得你靠谱，再告诉他自己怎么找你。</b>\n\n<div class="shot-item">视频里不用喊"找我"。你只需要在每条的结尾留一个自然的口子——"想知道更多细节的，私信我"。想找的人自己会找。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('怎么让客户主动私信我')">让客户主动找我</button><button class="followup-btn" onclick="quickFollow('怎么定价比较好')">怎么定价</button></div>`;

  if(q.includes('没时间')||q.includes('忙')||q.includes('没空')){

  if(q.includes('第一条拍什么')||q.includes('第一条发什么')||q.includes('第一条内容')){

<div class="shot-item">不用花哨。就对着手机说三句话："我是做${industry}的，干了X年了。之前我遇到过一件事...（讲一个真实的坑或者故事）。所以我决定开始拍视频，把我这些年踩过的坑、学到的东西，一个一个告诉你。"</div>

  if(q.includes('怕别人')||q.includes('怕丢人')||q.includes('怕被笑')||q.includes('不敢发')||q.includes('怕发出去')||(q.includes('怕')&&(q.includes('人看')||q.includes('没人')))||(q.includes('担心')&&q.includes('别人'))){

  // 练习/训练/怎么学
  if(q.includes('怎么练')||q.includes('怎么学')||q.includes('训练')||q.includes('练习')||q.includes('每天')||q.includes('坚持')){

<div class="shot-item">这一张纸就是你做内容最好的素材。你不是在"创作内容"——你只是把你每天都在做的最好的那几次回答，拍成了视频。</div>`;

客户打电话来说"我想找个阿姨"。你问他"你需要什么样的"。他说"勤快的、爱干净的"。然后你给他派了一个公认最勤快的阿姨。干了半个月，客户说"换一个吧"。你问为什么，他说"这个阿姨挺好的，但是..."

  if(q.includes('怎么引流')||q.includes('怎么获客')||q.includes('怎么找客户')||q.includes('怎么让别人')||q.includes('怎么让人来')) return `做${industry}的引流——<b>说白了就是在客户最可能搜到你的地方出现。</b>\n\n<div class="shot-item"><b>线上</b>：同城搜索靠关键词。每条视频带上城市名+${industry}。号多弄几个。</div>\n\n<div class="shot-item"><b>线下</b>：你服务过的每一个满意的客户，让他帮你发一条朋友圈/抖音。不是让你花钱请他发——是你服务完了之后他自己愿意发。这个叫"体验溢出"。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('同城搜索具体怎么做')">同城怎么推</button><button class="followup-btn" onclick="quickFollow('怎么让客户主动帮我宣传')">客户帮传</button></div>`;

  return `你说到这点，我想问你一个问题——你做${industry}这段时间，<b>有没有遇到过一种客户，你跟他聊完之后自己都觉得"我今天聊得特别好"？</b>

<div class="shot-item">你把这个场景回想一下。那个让你觉得"聊得好"的瞬间——其实就是你做内容最好的素材。因为那个瞬间，你说的话是真的打中了对方心里在想的东西。</div>

<div class="shot-item">你跟我说说那个场景。我帮你分析——当时你哪句话说对了，为什么那句话会管用。然后我们把那句话变成一条视频。</div>\n\n<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('举个例子说得更具体点')">举个例子</button><button class="followup-btn" onclick="quickFollow('客户到底想要什么')">客户真正要什么</button><button class="followup-btn" onclick="quickFollow('怎么开始第一步')">怎么开始</button></div>`;

    "健身":"少儿培训","私教":"少儿培训","游泳":"少儿培训",
    "洗车":"洗车","汽车美容":"洗车",
    "二手":"二手车","机车":"二手车","摩托":"二手车",
    "钓鱼":"钓鱼","路亚":"钓鱼",
    "鲜花":"花店","绿植":"绿植租摆","花艺":"花店","盆栽":"绿植租摆",
    "蛋糕":"蛋糕店","烘焙":"蛋糕店","甜品":"蛋糕店","面包":"蛋糕店",

    "会计":"知识付费","律师":"律师","保险":"保险","课程":"知识付费","咨询":"知识付费","法务":"律师","财税":"知识付费",
    "电商":"知识付费","直播":"知识付费","带货":"知识付费",
    "火锅":"火锅","奶茶":"奶茶","密室":"密室逃脱","剧本杀":"剧本杀","搬家":"搬家","开锁":"开锁","防水":"防水补漏","漏水":"防水补漏","补漏":"防水补漏",
    "甲醛":"除甲醛","除味":"除甲醛","空气治理":"除甲醛",
    "空调":"空调维修","中央空调":"空调维修","地暖":"空调维修",
    "化妆":"化妆跟妆","跟妆":"化妆跟妆","新娘妆":"化妆跟妆",
    "窗帘":"窗帘","卷帘":"窗帘","百叶":"窗帘",

    "车险":"保险","寿险":"保险","重疾":"保险",
  };
  for(let [kw, target] of Object.entries(map)){
    if(s.includes(kw) && DB[target]) return {key:target, ...DB[target]};
  }
  return {key:s, cat:"通用", answ:getGenericAnswer(s)};

  // 记录未匹配行业
  const ts = new Date().toISOString().slice(0,16);
  try {
    let unmatched = JSON.parse(localStorage.getItem('vg_unmatched_industries')||'[]');
    unmatched.unshift({industry:s, time:ts});
    if(unmatched.length > 200) unmatched = unmatched.slice(0,200); // 只保留最近200条
    localStorage.setItem('vg_unmatched_industries', JSON.stringify(unmatched));
  } catch(e){}
}

// ── 未匹配行业管理 ──────────────
function viewUnmatched(){
  try {
    const raw = localStorage.getItem('vg_unmatched_industries');
    if(!raw) return [];
    return JSON.parse(raw);
  } catch(e){ return []; }
}

function hasUnmatchedSince(since){
  const list = viewUnmatched();
  return list.some(x => x.time > since);
}

// ── 自动优化提示 ──────────────
function checkUnmatchedAlert(){
  const lastChecked = localStorage.getItem('vg_unmatched_checked') || '';
  const list = viewUnmatched();
  const newOnes = lastChecked ? list.filter(x => x.time > lastChecked) : list;
  if(newOnes.length >= 3){
    const msg = `📊 有 ${newOnes.length} 个新行业未被覆盖：${newOnes.slice(0,3).map(x=>x.industry).join('、')}${newOnes.length>3?'等':''}。可优化。`;
    if(document.getElementById('cdkOverlay').classList.contains('hidden')){
      addMsg('bot', `<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px;font-size:12px;color:#f59e0b">${msg}<br><span style="color:#888">输入"@管理"查看全部未覆盖行业</span></div>`);
    }
  }
  localStorage.setItem('vg_unmatched_checked', new Date().toISOString().slice(0,16));
  // 每天检查一次
  setTimeout(checkUnmatchedAlert, 86400000);
}

// ── 管理面板 ──────────────
function showAdminPanel(){
  const list = viewUnmatched();
  if(!list.length){
    addMsg('bot', '目前没有未覆盖行业。所有用户输入的行业都匹配到了。');
    return;
  }
  // 按出现次数排序
  const count = {};
  list.forEach(x => { count[x.industry] = (count[x.industry]||0)+1; });
  const sorted = Object.entries(count).sort((a,b)=>b[1]-a[1]);

  let html = '<div class="section-title">📊 未覆盖行业统计（最近200条）</div>';
  html += `<div style="font-size:11px;color:#666;margin-bottom:8px">共 ${list.length} 条记录，${sorted.length} 个不同行业</div>`;
  html += '<div class="shot-item" style="max-height:300px;overflow-y:auto">';
  for(let [ind, cnt] of sorted.slice(0,20)){
    html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a3e"><span>${ind}</span><span style="color:#f59e0b">${cnt}次</span></div>`;
  }
  html += '</div>';
  html += '<div style="margin-top:10px;font-size:11px"><button class="followup-btn" onclick="clearUnmatched()">清空记录</button><button class="followup-btn" onclick="exportUnmatched()">导出JSON</button></div>';
  addMsg('bot', html);
}

function clearUnmatched(){
  localStorage.removeItem('vg_unmatched_industries');
  addMsg('bot', '已清空所有未覆盖行业记录。');
}

function exportUnmatched(){
  const list = viewUnmatched();
  if(!list.length){
    addMsg('bot','暂无数据。');
    return;
  }
  const json = JSON.stringify(list, null, 2);
  navigator.clipboard.writeText(json).then(()=>{
    addMsg('bot','已复制到剪贴板（JSON格式）。可以粘贴给我来优化系统。');
  }).catch(()=>{
    addMsg('bot','复制失败。数据如下：<br><pre style="font-size:11px;max-height:200px;overflow:auto">'+json.slice(0,2000)+'</pre>');
  });
}

function getGenericAnswer(industry){
  return `<div class="section-title">📹 你这个行业我没做深度拆解——但先给你四个能用的方向</div>
<div class="shot-item"><b>①</b> 拍你干活过程中的一个真实瞬间。不是成品，是过程。你在搬货、在打包、在跟客户打电话——就拍你最日常的那个动作。</div>
<div class="shot-item"><b>②</b> 拍你踩过的坑——"干了这么多年${industry}，直到上个月才发现一件事..."。开门见山讲真实经历。结尾落一个建议。</div>
<div class="shot-item"><b>③</b> 拍你跟客户的一次真实对话。不用剧本。服务时开着手机录一段。真实永远比编的好看。</div>
<div class="shot-item"><b>④</b> 拍你的价格——"做一次多少钱、用什么东西、多久能好、跟便宜的有什么区别"。四个问题一个个回答。这是同城搜索最好的内容。</div>

<span class="highlight">搞流量的核心就四个——钱、冲突、反差、情绪。一样没有的，再好的画面也火不了。</span>
<span class="highlight" style="display:block;margin-top:6px">你多说一点——你做${industry}多久了、现在最头疼的是什么？我帮你往深了挖。</span>`;
}

// ── 对话逻辑 ──────────────────────
const HOT_TAGS = ["烧烤","火锅","美发","美甲","奶茶","卖酒","房产中介","纹身","卖茶叶","二手车","摄影","宠物美容","清吧","酒吧","摆摊","少儿培训","舞蹈老师","汽修","花店","蛋糕店","民宿","钓鱼","家电清洗","洗车","月嫂","搬嫁","全屋定制","瓷砖","窗帘","婚庆","瑜伽","空调维修","化妆跟妆","剧本杀","密室逃脱","除甲醛","防水补漏","开锁","律师","保险","绿植租摆","知识付费"];

function initGuideTags(){
  document.getElementById('guideTags').innerHTML = [...HOT_TAGS].sort(()=>Math.random()-.5).slice(0,12).map(t=>
    `<button class="guide-tag" onclick="quickAsk('${t}')">${t}</button>`
  ).join('');
}

function quickAsk(tag){ document.getElementById('chatInput').value=`我是做${tag}的`; send(); }
function quickFollow(q){ document.getElementById('chatInput').value=q; send(); }

function addMsg(role, html){
  const div = document.createElement('div');
  div.className = `msg-row ${role}`;
  div.innerHTML = `<div class="msg-bubble">${html}</div>`;
  document.getElementById('chatArea').appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
  saveChat();  // 自动保存对话
}

function send(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  const welcome = document.querySelector('.welcome-msg');
  const guideTags = document.getElementById('guideTags');
  if(welcome) welcome.style.display = 'none';
  if(guideTags) guideTags.style.display = 'none';

  addMsg('user', text);

  const typing = document.getElementById('typing');
  typing.classList.add('show');
  typing.scrollIntoView({behavior:'smooth',block:'end'});

  document.getElementById('btnSend').disabled = true;
  document.getElementById('chatInput').disabled = true;

  setTimeout(() => {
    typing.classList.remove('show');

    if(text === '@管理' || text === '@admin'){
      showAdminPanel();
    } else if(convTurn === 0 || looksLikeNewIndustry(text)){
      // 第一轮（或用户重新说了行业）：行业识别 → 行业策略
      const match = matchIndustry(text);
      lastIndustry = match.key;
      convTurn = 1;
      addMsg('bot', match.answ + `<div class="followup-hint"><button class="followup-btn" onclick="quickFollow('我刚开的没经验怎么办')">刚开没经验</button><button class="followup-btn" onclick="quickFollow('不想露脸怎么办')">不想露脸</button><button class="followup-btn" onclick="quickFollow('发了没人看怎么办')">没人看</button><button class="followup-btn" onclick="quickFollow('怎么变现收钱')">怎么收钱</button></div>`);
    } else {
      // 第二轮以后：关键词识别 → 追问答案
      const match = matchIndustry(lastIndustry);
      const cat = match.cat || '';
      const resp = getFollowup(text, lastIndustry, cat);
      convTurn++;
      addMsg('bot', resp);
    }

    document.getElementById('btnSend').disabled = false;
    document.getElementById('chatInput').disabled = false;
    document.getElementById('chatInput').value = '';
    document.getElementById('chatInput').focus();
  }, 500 + Math.random()*400);
}

function resetChat(){
  lastIndustry = ''; convTurn = 0;
  localStorage.removeItem(CHAT_STORAGE_KEY);  // 清除对话记录
  document.getElementById('chatArea').innerHTML = `
    <div class="welcome-msg">
      <div class="emoji">👋</div>
      <div class="msg">告诉我你是<b>做什么行业的</b></div>
      <div class="msg" style="font-size:13px;color:#666;margin-top:4px">我把怎么拍、拍什么、怎么变现直接告诉你</div>
      <div class="msg" style="font-size:13px;color:#666">可以一直聊——你有什么问题接着问就行</div>
    </div>
    <div class="guide-tags" id="guideTags"></div>
  `;
  initGuideTags();
  document.getElementById('chatInput').value = '';
  document.getElementById('chatInput').focus();
}

// ── 页面加载 ──────────────────────
if(!restoreChat()){ initGuideTags(); }
setTimeout(checkUnmatchedAlert, 5000);  // 5秒后检查是否有新未覆盖行业
</script>
